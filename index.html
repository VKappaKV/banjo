<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/banjo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banjo</title>
    <script>
      (function() {
        try {
          var t = localStorage.getItem("banjo-theme");
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
