name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 10

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: |
          node server/relay.mjs &
          sleep 2
          pnpm test
        shell: bash
      - run: pnpm build:web
      - run: pnpm build:ext:chrome
      - run: node scripts/audit-dist.mjs
      - run: pnpm build:ext:firefox
      - run: node scripts/audit-dist.mjs
